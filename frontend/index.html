<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />

    <title>CoupleCare — Your Relationship Companion</title>
    <meta
      name="description"
      content="Stay close with your partner: chat, moods, memories, milestones, and AI relationship insights — all in one place."
    />
    <meta name="theme-color" content="#ff5c8a" />

    <!-- Apply the saved theme before first paint to avoid a light/dark flash. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("cc-theme") || "system";
          var dark =
            p === "dark" ||
            (p === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var resolved = dark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", resolved);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", dark ? "#0d0d14" : "#ff5c8a");
        } catch (e) {}
      })();
    </script>

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CoupleCare" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CoupleCare — Your Relationship Companion" />
    <meta
      property="og:description"
      content="Chat, moods, memories, milestones, and AI relationship insights for couples."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CoupleCare" />
    <meta
      name="twitter:description"
      content="Your relationship companion — chat, moods, memories, and AI insights."
    />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
